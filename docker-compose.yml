# ===========================
# DealOS AI — Docker Compose
# ===========================
# Production-like configuration for all services.
# For development overrides, use: docker-compose.dev.yml

services:
  # ─────────────────────────────────────
  # PostgreSQL with pgvector
  # ─────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dealos-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dealos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dealos_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-dealos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dealos} -d ${POSTGRES_DB:-dealos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────
  # Redis (Cache, Queue, Rate Limiting)
  # ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: dealos-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────
  # MinIO (S3-Compatible Object Storage)
  # ─────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: dealos-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-dealos_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-dealos_minio_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────
  # MinIO Bucket Initialization
  # ─────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: dealos-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set dealos http://minio:9000 $${MINIO_ACCESS_KEY:-dealos_minio} $${MINIO_SECRET_KEY:-dealos_minio_secret};
      mc mb --ignore-existing dealos/$${MINIO_BUCKET:-dealos-documents};
      mc anonymous set download dealos/$${MINIO_BUCKET:-dealos-documents};
      echo 'MinIO bucket initialized';
      "

  # ─────────────────────────────────────
  # Backend (FastAPI)
  # ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dealos-backend
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
